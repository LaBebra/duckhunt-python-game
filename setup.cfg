# ─────────────────────────────────────────────────────────────────────────
# setup.cfg — централізована конфігурація інструментів проєкту
#
# Містить налаштування для:
#   [flake8]  — лінтер коду
#   [tool:pytest] — фреймворк тестів
# ─────────────────────────────────────────────────────────────────────────

# ── Flake8 ────────────────────────────────────────────────────────────────
[flake8]
# Максимальна довжина рядка. 100 символів — розумний компроміс між
# PEP 8 (79) та реальним кодом з довгими іменами/рядками.
max-line-length = 100

# Папки та файли, які flake8 ігнорує повністю
exclude =
    __pycache__,
    .git,
    .venv,
    venv,
    build,
    dist,
    *.egg-info

# Коди помилок, які ігноруємо у всьому проєкті:
#   W503 — перенос рядка перед бінарним оператором (конфліктує зі стилем Black)
extend-ignore = W503

# Показати кількість кожного типу помилок у кінці звіту
statistics = True

# Показати загальну кількість помилок
count = True


# ── Pytest ────────────────────────────────────────────────────────────────
[tool:pytest]
# Де шукати тести
testpaths = tests

# Додаткові шляхи до sys.path (щоб імпортувати модулі гри без package-структури)
pythonpath = .

# Опції за замовчуванням при кожному запуску:
#   -v           → verbose: кожен тест окремим рядком
#   --tb=short   → короткий traceback при падінні (не весь стек)
addopts =
    -v
    --tb=short
    --html=reports/test-report.html
    --self-contained-html

# Мінімальна версія pytest
minversion = 8.0
