# ╔══════════════════════════════════════════════════════════════════════╗
# ║            Duck Hunt — GitHub Actions CI/CD Pipeline                ║
# ║                                                                      ║
# ║  Етапи:                                                              ║
# ║    Job 1 · lint  — Flake8 + HTML-звіт                               ║
# ║    Job 2 · test  — Pytest + HTML-звіт  (після lint)                 ║
# ║    Job 3 · build — PyInstaller         (після test)                 ║
# ║                                                                      ║
# ║  HTML-звіти прикріплюються до кожного коміту як GitHub Artifacts.   ║
# ╚══════════════════════════════════════════════════════════════════════╝

name: Duck Hunt CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# ════════════════════════════════════════════════════════════════════════
# JOB 1 — LINT
# Перевіряє стиль коду за допомогою Flake8.
# Генерує HTML-звіт і прикріплює його до коміту як Artifact.
# ════════════════════════════════════════════════════════════════════════
jobs:
  lint:
    name: "1 · Lint (Flake8 + HTML report)"
    runs-on: ubuntu-latest

    steps:
      # ── 1.1 Клонуємо репозиторій ──────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 1.2 Встановлюємо Python 3.12 ──────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── 1.3 Кешуємо pip-пакети ────────────────────────────────────────
      # Кешування прискорює повторні запуски пайплайну:
      # якщо requirements-dev.txt не змінився — пакети беруться з кешу.
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ── 1.4 Встановлюємо flake8 та flake8-html ─────────────────────
      - name: Install linting dependencies
        run: pip install flake8 flake8-html

      # ── 1.5 Створюємо папку для звіту ─────────────────────────────────
      - name: Create reports directory
        run: mkdir -p reports

      # ── 1.6 Запускаємо Flake8 ─────────────────────────────────────────
      # Параметри:
      #   --format=html          → вивід у HTML-форматі (через flake8-html)
      #   --htmldir=reports/lint → папка для HTML-звіту
      #   --max-line-length=100  → рядки до 100 символів
      #   --statistics           → зведення по типах помилок
      #   --count                → загальна кількість помилок
      #   || true                → не провалювати крок якщо є попередження
      #                            (провал буде видно у звіті, не зупиняти pipeline)
      # Примітка: якщо потрібно провалювати pipeline при будь-якій помилці —
      # видали "|| true"
      - name: Run Flake8 with HTML report
        run: |
          flake8 . \
            --format=html \
            --htmldir=reports/lint \
            --max-line-length=100 \
            --exclude=__pycache__ \
            --extend-ignore=W503 \
            --statistics \
            --count \
            --tee \
            --output-file=reports/flake8-raw.txt || true

      # ── 1.7 Перевірка на критичні помилки (E, F) ──────────────────────
      # Окремий запуск flake8 який провалює pipeline при синтаксичних
      # помилках (E9xx, F8xx) — навіть якщо HTML-звіт вже збережено.
      - name: Fail on critical errors
        run: |
          flake8 . \
            --select=E9,F8 \
            --max-line-length=100 \
            --exclude=__pycache__

      # ── 1.8 Завантажуємо HTML-звіт лінтингу як Artifact ───────────────
      # Artifact буде доступний у вкладці Actions → Summary → Artifacts.
      # Ім'я містить SHA коміту щоб розрізняти звіти різних запусків.
      - name: Upload lint report
        if: always()   # завантажуємо навіть якщо lint знайшов помилки
        uses: actions/upload-artifact@v4
        with:
          name: lint-report-${{ github.sha }}
          path: reports/lint/
          retention-days: 30


  # ════════════════════════════════════════════════════════════════════════
  # JOB 2 — TEST
  # Запускає всі pytest-тести у headless-режимі.
  # Генерує HTML-звіт (pytest-html) і прикріплює до коміту.
  # ════════════════════════════════════════════════════════════════════════
  test:
    name: "2 · Test (Pytest + HTML report)"
    runs-on: ubuntu-latest
    needs: lint   # запускається тільки якщо lint пройшов

    steps:
      # ── 2.1 Клонуємо репозиторій ──────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2.2 Встановлюємо Python 3.12 ──────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── 2.3 Кешуємо pip-пакети ────────────────────────────────────────
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ── 2.4 Встановлюємо залежності ───────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      # ── 2.5 Headless-середовище для pygame ────────────────────────────
      # SDL_VIDEODRIVER=dummy і SDL_AUDIODRIVER=dummy дозволяють pygame
      # ініціалізуватись без реального вікна і звукового пристрою.
      # PYTHONPATH=duckhunt — pytest знаходить модулі гри без хаків.
      - name: Configure headless environment
        run: |
          echo "SDL_VIDEODRIVER=dummy" >> $GITHUB_ENV
          echo "SDL_AUDIODRIVER=dummy" >> $GITHUB_ENV
          echo "PYTHONPATH=duckhunt"   >> $GITHUB_ENV

      # ── 2.6 Створюємо папку для звіту ─────────────────────────────────
      - name: Create reports directory
        run: mkdir -p reports

      # ── 2.7 Запускаємо pytest ─────────────────────────────────────────
      # Параметри:
      #   tests/                       → папка з тестами
      #   -v                           → verbose
      #   --tb=short                   → короткий traceback
      #   --html=reports/test-report.html → HTML-звіт (pytest-html)
      #   --self-contained-html        → весь CSS/JS вбудований у один файл
      #   --junit-xml=reports/junit.xml → XML для GitHub Summary
      - name: Run pytest
        run: |
          pytest tests/ \
            -v \
            --tb=short \
            --html=reports/test-report.html \
            --self-contained-html \
            --junit-xml=reports/junit.xml

      # ── 2.8 Публікуємо результати тестів у Summary коміту ─────────────
      # action-junit-report виводить результати JUnit XML прямо у
      # GitHub Summary — видно без скачування артефакту.
      - name: Publish test results to commit summary
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: reports/junit.xml
          check_name: "Pytest Results"
          fail_on_failure: true

      # ── 2.9 Завантажуємо HTML-звіт тестів як Artifact ─────────────────
      - name: Upload test report
        if: always()   # завантажуємо навіть якщо тести впали
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ github.sha }}
          path: reports/test-report.html
          retention-days: 30


  # ════════════════════════════════════════════════════════════════════════
  # JOB 3 — BUILD
  # Пакує проєкт у standalone-виконуваний файл через PyInstaller.
  # Запускається тільки якщо test завершився успішно.
  # ════════════════════════════════════════════════════════════════════════
  build:
    name: "3 · Build (PyInstaller)"
    runs-on: ubuntu-latest
    needs: test   # запускається тільки якщо test пройшов

    steps:
      # ── 3.1 Клонуємо репозиторій ──────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 3.2 Встановлюємо Python 3.12 ──────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── 3.3 Кешуємо pip ───────────────────────────────────────────────
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ── 3.4 Встановлюємо залежності для білду ─────────────────────────
      - name: Install build dependencies
        run: pip install -r requirements-dev.txt

      # ── 3.5 Пакуємо через PyInstaller ─────────────────────────────────
      - name: Build executable
        run: |
          pyinstaller main.py \
            --onefile \
            --name duck-hunt \
            --add-data "assets:assets" \
            --distpath dist \
            --noconfirm \
            --clean

      # ── 3.6 Перевіряємо результат ─────────────────────────────────────
      - name: Verify build output
        run: |
          ls -lh dist/
          test -f dist/duck-hunt && echo "✓ Бінарник створено успішно"
          echo "Розмір: $(du -sh dist/duck-hunt | cut -f1)"

      # ── 3.7 Зберігаємо бінарник як Artifact ───────────────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: duck-hunt-linux-${{ github.sha }}
          path: dist/duck-hunt
          retention-days: 14
          if-no-files-found: error
